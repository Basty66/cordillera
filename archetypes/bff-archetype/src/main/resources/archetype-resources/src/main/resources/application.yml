server:
  port: 8090

spring:
  application:
    name: ${artifactId}
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: grupo-cordillera-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers

resilience4j:
  circuitbreaker:
    instances:
      default:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      default:
        timeout-duration: 10s
