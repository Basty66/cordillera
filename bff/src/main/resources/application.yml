server:
  port: 8090

spring:
  application:
    name: bff
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

jwt:
  secret: GrupoCordillera2026SecretKeyParaJWTTokenSuperSegura!
  expiration: 86400000

ms-ventas:
  url: http://localhost:8081
ms-datos-org:
  url: http://localhost:8082
ms-indicadores:
  url: http://localhost:8083

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      ventas-client:
        base-config: default
      indicadores-client:
        base-config: default
      datos-org-client:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
