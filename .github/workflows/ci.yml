name: CI - Build & Test

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [api-gateway, bff, ms-ventas, ms-datos-org, ms-indicadores]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build & Test ${{ matrix.module }}
        run: |
          cd ${{ matrix.module }}
          ./mvnw clean test -q

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build

  docker-images:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ms-ventas
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ms-ventas
          load: true
          tags: cordillera/ms-ventas:latest
      - name: Build ms-datos-org
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ms-datos-org
          load: true
          tags: cordillera/ms-datos-org:latest
      - name: Build ms-indicadores
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ms-indicadores
          load: true
          tags: cordillera/ms-indicadores:latest
      - name: Build bff
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bff
          load: true
          tags: cordillera/bff:latest
      - name: Build api-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api-gateway
          load: true
          tags: cordillera/api-gateway:latest
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          load: true
          tags: cordillera/frontend:latest
