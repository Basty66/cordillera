services:
  postgres:
    image: postgres:14-alpine
    container_name: pg-cordillera
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: npg_RkUIf1wX4uDx
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neondb_owner -d neondb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ms-ventas:
    image: bootstian/ms-ventas:latest
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/neondb?currentSchema=ventas
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - SPRING_DATASOURCE_PASSWORD=npg_RkUIf1wX4uDx
      - SERVER_PORT=8081
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ms-datos-org:
    image: bootstian/ms-datos-org:latest
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/neondb?currentSchema=datos_org
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - SPRING_DATASOURCE_PASSWORD=npg_RkUIf1wX4uDx
      - SERVER_PORT=8082
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ms-indicadores:
    image: bootstian/ms-indicadores:latest
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/neondb?currentSchema=indicadores
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - SPRING_DATASOURCE_PASSWORD=npg_RkUIf1wX4uDx
      - SERVER_PORT=8083
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  bff:
    image: bootstian/bff:latest
    ports:
      - "8090:8090"
    environment:
      - SERVER_PORT=8090
      - MS-VENTAS_URL=http://ms-ventas:8081
      - MS-DATOS-ORG_URL=http://ms-datos-org:8082
      - MS-INDICADORES_URL=http://ms-indicadores:8083
    depends_on:
      postgres:
        condition: service_healthy
      ms-ventas:
        condition: service_started
      ms-datos-org:
        condition: service_started
      ms-indicadores:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    image: bootstian/api-gateway:latest
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
    depends_on:
      ms-ventas:
        condition: service_started
      ms-datos-org:
        condition: service_started
      ms-indicadores:
        condition: service_started
      bff:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: bootstian/frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  pgdata:
